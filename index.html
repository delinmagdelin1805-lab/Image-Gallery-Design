<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Image Gallery</title>

    <link rel="stylesheet"
        href="style.css">

</head>

<body>

    <!-- Header -->

    <header>

        <h1>
            Responsive Image Gallery
        </h1>

        <p>
            Beautiful gallery layout using HTML & CSS
        </p>

    </header>

    <!-- Gallery -->

    <section class="gallery">

        <div class="gallery-item">

            <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1200&auto=format&fit=crop"
                alt="Nature">

        </div>

        <div class="gallery-item">

            <img src="https://images.unsplash.com/photo-1493246507139-91e8fad9978e?q=80&w=1200&auto=format&fit=crop"
                alt="Mountains">

        </div>

        <div class="gallery-item">

            <img src="https://images.unsplash.com/photo-1494526585095-c41746248156?q=80&w=1200&auto=format&fit=crop"
                alt="Beach">

        </div>

        <div class="gallery-item">

            <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200&auto=format&fit=crop"
                alt="Forest">

        </div>

        <div class="gallery-item">

            <img src="https://images.unsplash.com/photo-1519125323398-675f0ddb6308?q=80&w=1200&auto=format&fit=crop"
                alt="City">

        </div>

        <div class="gallery-item">

            <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?q=80&w=1200&auto=format&fit=crop"
                alt="Technology">

        </div>

    </section>

</body>

</html>
